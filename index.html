<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dataset Collector — Tokiva</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- TOP HEADER -->
  <header class="header">
    <div class="logo">
      <span>📸</span> Dataset <span>Collector</span>
    </div>
    <div class="header-actions header-desktop-only">
      <button id="download-all-btn" class="btn btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download All ZIP
      </button>
      <button id="add-dataset-desktop-btn" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Tambah Dataset
      </button>
    </div>
    <!-- Mobile Download All Action in Header -->
    <button id="download-all-mobile-header" class="btn btn-icon btn-secondary btn-sm header-mobile-only" aria-label="Download All ZIP">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
  </header>

  <!-- MAIN CONTENT -->
  <main class="container">
    
    <div class="page-title-section">
      <h2>Daftar Produk</h2>
      <div id="dataset-summary" class="photo-badge">
        <span>0</span> Dataset
      </div>
    </div>

    <!-- Search Box -->
    <div class="search-container">
      <div class="search-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" class="form-control" placeholder="Cari nama produk / dataset...">
      </div>
    </div>

    <!-- Dataset Cards Grid -->
    <div id="dataset-grid" class="dataset-grid">
      <!-- Loading Skeleton or State -->
      <div class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="loading-spinner"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
        <h3>Memuat Dataset...</h3>
        <p>Sedang menghubungkan ke Supabase database.</p>
      </div>
    </div>

  </main>

  <!-- MOBILE BOTTOM NAVIGATION -->
  <nav class="bottom-nav">
    <button class="bottom-nav-item active" id="nav-home" aria-label="Home">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </button>
    <button class="bottom-nav-item" id="nav-add-dataset" aria-label="Tambah">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Tambah</span>
    </button>
  </nav>

  <!-- CREATE / EDIT MODAL DIALOG -->
  <div id="dataset-modal" class="modal-backdrop">
    <div class="modal-container">
      <div class="modal-header">
        <h3 id="modal-title" class="modal-title">Tambah Dataset</h3>
        <button id="modal-close-btn" class="modal-close" aria-label="Tutup">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      
      <form id="dataset-form">
        <input type="hidden" id="dataset-id-input">
        <div class="form-group">
          <label for="dataset-name-input">Nama Produk</label>
          <input type="text" id="dataset-name-input" class="form-control" placeholder="Contoh: Indomie Goreng" required autocomplete="off">
        </div>
        
        <div class="modal-actions">
          <button type="button" id="modal-cancel-btn" class="btn btn-secondary">Batal</button>
          <button type="submit" id="modal-submit-btn" class="btn btn-primary">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- TOAST NOTIFICATION CONTAINER -->
  <div id="toast-container" class="toast-container"></div>

  <!-- MAIN ENTRY JS -->
  <script type="module" src="/js/index-page.js"></script>
</body>
</html>
